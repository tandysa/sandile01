<!DOCTYPE html>
<html lang="zu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Smart Reply</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin: 40px; }
    textarea { width: 90%; height: 120px; margin: 10px; }
    button { padding: 10px 20px; font-size: 16px; }
    .output { margin-top: 20px; font-weight: bold; }
  </style>
</head>
<body>
  <h2>AI Smart Reply (Live)</h2>
  <textarea id="inputMessage" placeholder="Bhala umlayezo..."></textarea><br>
  <button onclick="generateReply()">Phendula nge AI</button>
  <div class="output" id="output"></div>

  <script>
    async function generateReply() {
      const msg = document.getElementById("inputMessage").value;

      const response = await fetch("https://api.openai.com/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer YOUR_API_KEY"
        },
        body: JSON.stringify({
          model: "gpt-4o-mini",
          messages: [
            { role: "system", content: "Reply like a young Zulu guy using casual tone, mix isiZulu and English, use words like bbe, mncwa, and emojis 🥹❤️" },
            { role: "user", content: msg }
          ]
        })
      });

      const data = await response.json();
      const reply = data.choices[0].message.content;

      document.getElementById("output").innerText = reply;
    }
  </script>
</body>
</html>
