<!DOCTYPE html>
<html lang="zu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zulu Smart Reply V2</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin: 50px; }
    textarea { width: 80%; height: 100px; margin: 10px; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    .output { margin-top: 20px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Zulu Smart Reply Assistant V2</h1>
  <p>Faka umlayezo → uthole impendulo ngokuzenzakalela</p>

  <textarea id="inputMessage" placeholder="Bhala umlayezo lapha..."></textarea><br>
  <button onclick="generateReply()">Thola Impendulo</button>

  <div class="output" id="output"></div>

  <script>
    function generateReply() {
      const msg = document.getElementById("inputMessage").value.toLowerCase();
      let replies = ["Ngizokuphendula maduze."];

      if (msg.includes("uphi")) {
        replies = [
          "Ngisabambekile kancane, ngizokutshela nje.",
          "Ngikhona kodwa busy kancane, ngizokuphendula.",
          "Ngizobuya kuwe manje, ngisazama ukuqeda izinto."
        ];
      } else if (msg.includes("wenza")) {
        replies = [
          "Ngisabhekene nezinto manje.",
          "Ngise busy kancane manje, ngizokuphendula kahle.",
          "Ngiyasebenza manje kodwa ngizokutshela."
        ];
      } else if (msg.includes("hey") || msg.includes("hi")) {
        replies = [
          "Yebo ngiyakubona.",
          "Hey, ngikhona nje kodwa busy kancane.",
          "Sawubona, ngizokuphendula manje nje."
        ];
      }

      const randomReply = replies[Math.floor(Math.random() * replies.length)];
      document.getElementById("output").innerText = randomReply;
    }
  </script>
</body>
</html>
